services:
  jarvis:
    build: .
    container_name: jarvis-agent
    volumes:
      - ${HOME}/Documents:/root/Documents
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  jarvis-once:
    build: .
    container_name: jarvis-agent-once
    volumes:
      - ${HOME}/Documents:/root/Documents
    env_file:
      - .env
    command: ["--once"]
